<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The BlackFlower</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- رابط كود الستايل الخارجي الخاص بك -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* ستايلات مخصصة فقط للفورم تتماشى مع طابعك الفخم */
        .form-group {
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #000000;
            border: 1px solid #444444;
            color: #ffffff;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ffffff;
        }
        .account-links {
            margin-top: 30px; 
            border-top: 1px dashed #333333; 
            padding-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="header-text-block">
                <div class="brand-title">The BlackFlower</div>
                <div class="brand-subtitle">Professional Art</div>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;">Create New Account</h2>
        <p style="color: #aaaaaa; margin-bottom: 40px; font-size: 0.9rem;">Join us today and start collecting digital profits.</p>
        
        <form id="register-form" style="width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center;">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="e.g., blackflower_user" required>
            </div>

            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="At least 6 characters" minlength="6" required>
            </div>

            <div class="auth-buttons-container" style="margin-top: 20px;">
                <!-- استخدام كلاس الزر الفخم الخاص بك هنا -->
                <button type="submit" id="register-btn" class="btn-blackflower">Register</button>
            </div>
        </form>

        <div class="account-links">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>

        <p id="reg-response-message" class="msg" style="display: none;"></p>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
