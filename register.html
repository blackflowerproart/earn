<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="brand-title">The BlackFlower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
    </header>

    <div class="container">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - BlackFlower ProArt</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>بوابة التسجيل وإنشاء الحسابات</header>

    <div class="container">
        <h2>انضم إلينا اليوم</h2>
        <p>قم بإنشاء حسابك المجاني لتبدأ في تنفيذ المهام وتجميع الأرباح.</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">اسم المستخدم (Username):</label>
                <input type="text" id="reg-username" placeholder="مثال: blackflower_art" required>
            </div>

            <div class="form-group">
                <label for="reg-email">البريد الإلكتروني:</label>
                <input type="email" id="reg-email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">كلمة المرور:</label>
                <input type="password" id="reg-password" placeholder="يجب ألا تقل عن 6 خانات" minlength="6" required>
            </div>

            <button type="submit" id="register-btn">إنشاء الحساب</button>
        </form>

        <div style="margin-top: 20px; font-size: 14px;">
            <p>تمتلك حساباً بالفعل؟ <a href="login.html" style="color: #10b981; font-weight: bold;">تسجيل الدخول من هنا</a></p>
        </div>

        <p id="reg-response-message" style="margin-top: 15px; font-weight: bold;"></p>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
