<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - The BlackFlower</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="brand-title">The BlackFlower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
    </header>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 10px; text-transform: uppercase;">إنشاء حساب جديد</h2>
        <p style="text-align: center; margin-bottom: 30px; font-size: 14px; opacity: 0.8;">انضم إلينا اليوم وابدأ في جمع الأرباح الرقمية.</p>
        
        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">اسم المستخدم (Username):</label>
                <input type="text" id="reg-username" placeholder="مثال: blackflower_user" required>
            </div>

            <div class="form-group">
                <label for="reg-email">البريد الإلكتروني:</label>
                <input type="email" id="reg-email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">كلمة المرور:</label>
                <input type="password" id="reg-password" placeholder="يجب ألا تقل عن 6 خانات" minlength="6" required>
            </div>

            <div style="text-align: center; margin-top: 10px;">
                <button type="submit" id="register-btn">إنشاء الحساب</button>
            </div>
        </form>

        <div style="margin-top: 30px; font-size: 13px; text-align: center; border-top: 1px dashed #ffffff; padding-top: 20px; line-height: 2;">
            <p>تمتلك حساباً بالفعل؟ <a href="login.html">تسجيل الدخول من هنا</a></p>
        </div>

        <p id="reg-response-message" class="msg" style="display: none;"></p>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
