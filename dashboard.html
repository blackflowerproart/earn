<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - The BlackFlower</title>
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* التنسيقات الإضافية للإطار العريض والأقسام السفلية تماشياً مع التصميم الأساسي */
        .control-panel-bar {
            width: 100%;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-top: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .user-stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px dashed #333333;
            padding-bottom: 15px;
        }

        .stat-item {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .stat-item span {
            color: #aaaaaa;
            font-family: monospace;
            transition: all 0.3s ease;
        }

        .navigation-buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        /* تخصيص أزرار لوحة التحكم بنفس الكلاس الأصلي لتأثير الهوفر المنعكس */
        .control-panel-bar .btn-blackflower {
            padding: 12px 25px;
            font-size: 0.95rem;
            min-width: 150px;
            flex: 1;
            min-width: calc(20% - 15px); /* توزيع متناسق على الشاشات الكبيرة */
            text-align: center;
        }

        .bottom-content-section {
            width: 100%;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .content-box {
            border: 1px solid #ffffff;
            background-color: #050505;
            padding: 25px;
            min-height: 250px;
        }

        .content-box h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 10px;
        }

        /* تنسيقات كروت المهام الديناميكية لتطابق الهوية البصرية */
        .task-card {
            border: 1px solid #333333;
            background-color: #000000;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-media-preview {
            width: 100%;
            max-height: 150px;
            object-cover: cover;
            border: 1px solid #222222;
            background-color: #111111;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-title {
            font-family: "Times New Roman", Times, serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .task-price {
            font-family: monospace;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 2px 8px;
            font-size: 0.9rem;
        }

        .task-details {
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            color: #aaaaaa;
            line-height: 1.4;
        }

        .task-action-btn {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            padding: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .task-action-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* تأثير التجميد والمربع الأسود الشفاف عند إتمام المهمة */
        .task-completed-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: auto;
        }

        .completed-badge {
            color: #ff4444;
            border: 2px solid #ff4444;
            padding: 5px 15px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: monospace;
            font-size: 1.3rem;
            background-color: #000000;
        }
