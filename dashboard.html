<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - The BlackFlower</title>
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* التنسيقات الإضافية للإطار العريض والأقسام السفلية تماشياً مع التصميم الأساسي */
        .control-panel-bar {
            width: 100%;
            background-color: #000000;
            border: 2px solid #ffffff;
            margin-top: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .user-stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px dashed #333333;
            padding-bottom: 15px;
        }

        .stat-item {
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .stat-item span {
            color: #aaaaaa;
            font-family: monospace;
            transition: all 0.3s ease;
        }

        .navigation-buttons-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        /* تخصيص أزرار لوحة التحكم بنفس الكلاس الأصلي لتأثير الهوفر المنعكس */
        .control-panel-bar .btn-blackflower {
            padding: 12px 25px;
            font-size: 0.95rem;
            flex: 1;
            min-width: calc(20% - 15px); /* توزيع متناسق على الشاشات الكبيرة */
            text-align: center;
        }

        .bottom-content-section {
            width: 100%;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .content-box {
            border: 1px solid #ffffff;
            background-color: #050505;
            padding: 25px;
            min-height: 250px;
        }

        .content-box h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #222222;
            padding-bottom: 10px;
        }

        /* تنسيقات كروت المهام الديناميكية المقتصرة على الاسم والربح فقط */
        .task-card {
            border: 1px solid #333333;
            background-color: #000000;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: border-color 0.3s ease;
        }

        .task-card:hover {
            border-color: #ffffff;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-title {
            font-family: "Times New Roman", Times, serif;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffffff;
        }

        .task-price {
            font-family: monospace;
            color: #00ff77; /* تمييز لون الربح بلون أخضر فخم مالي */
            border: 1px solid #00ff77;
            padding: 2px 8px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .task-action-btn {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            padding: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            width: 100%;
        }

        .task-action-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* التجاوب مع شاشات الهواتف */
        @media (max-width: 768px) {
            .user-stats-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .control-panel-bar .btn-blackflower {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="header-text-block">
                <div class="brand-title">The BlackFlower</div>
                <div class="brand-subtitle">Professional Art</div>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 30px; max-width: 100%;">
        
        <div class="control-panel-bar">
            
            <div class="user-stats-row">
                <div class="stat-item">👤 Username: <span id="user-display-name">Loading...</span></div>
                <div class="stat-item">💰 Wallet Balance: <span id="wallet-balance">0.0000</span> $</div>
                <div class="stat-item">🛡️ Rank: <span id="account-type-status">Loading...</span></div>
            </div>

            <div class="navigation-buttons-row">
                <button onclick="window.location.href='dashboard.html'" class="btn-blackflower">🏠 Dashboard</button>
                <button onclick="window.location.href='tasks.html'" class="btn-blackflower">📋 Tasks</button>
                <button onclick="window.location.href='ads.html'" class="btn-blackflower">📺 Advertisements</button>
                <button onclick="window.location.href='mining.html'" class="btn-blackflower">⛏️ Mining Room</button>
                <button onclick="window.location.href='faucet.html'" class="btn-blackflower">🚰 Faucet Gift</button>
                <button onclick="window.location.href='wallet-io.html'" class="btn-blackflower">💳 Wallet Transfer</button>
                <button onclick="window.location.href='live-chat.html'" class="btn-blackflower">💬 Live Support</button>
                <button onclick="window.location.href='settings.html'" class="btn-blackflower">⚙️ Account Settings</button>
                
                <button id="admin-panel-btn" onclick="window.location.href='admin.html'" class="btn-blackflower" style="display: none; border-color: #00ff77; color: #00ff77;">👑 Admin Panel</button>
                
                <button id="logout-link" class="btn-blackflower" style="border-color: #ff4444; color: #ff4444;">🚪 Logout</button>
            </div>
        </div>

        <div class="bottom-content-section">
            
            <div class="content-box">
                <h3>📋 Available Tasks</h3>
                <div id="tasks-container-display">
                    <p style="color: #666; font-size: 0.95rem;">Active tasks will load here directly...</p>
                </div>
            </div>

            <div class="content-box">
                <h3>📺 Featured Ads</h3>
                <div id="ads-container-display">
                    <p style="color: #666; font-size: 0.95rem;">Sponsored advertisements will stream here...</p>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof supabase !== 'undefined') {
                loadDashboardTasks();
            } else {
                console.error("Supabase client is not initialized. Please check supabase-config.js");
            }
        });

        async function loadDashboardTasks() {
            const container = document.getElementById('tasks-container-display');
            
            try {
                // 1. جلب بيانات المستخدم الحالي المسجل
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                if (userError || !user) {
                    container.innerHTML = `<p style="color: #ff4444; font-size: 0.9rem;">Please log in to see available tasks.</p>`;
                    return;
                }

                // 2. جلب المهام التي أرسلها هذا المستخدم بالفعل مسبقاً لاستثنائها تماماً
                const { data: userSubmissions, error: subError } = await supabase
                    .from('task_submissions')
                    .select('task_id')
                    .eq('user_id', user.id);

                if (subError) throw subError;

                // تحويل قيم الـ IDs إلى مصفوفة بسيطة
                const completedTaskIds = userSubmissions ? userSubmissions.map(s => s.task_id) : [];

                // 3. بناء استعلام ذكي يجلب (المعرف، العنوان، والربح فقط) من جدول tasks
                let tasksQuery = supabase
                    .from('tasks')
                    .select('id, title, reward')
                    .order('created_at', { ascending: false });

                // تجميد وحجب: إذا كان المستخدم قد نفذ أي مهام مسبقاً، نقوم بإخفائها تماماً من الاستعلام
                if (completedTaskIds.length > 0) {
                    tasksQuery = tasksQuery.not('id', 'in', `(${completedTaskIds.join(',')})`);
                }

                const { data: tasks, error: tasksError } = await tasksQuery;
                if (tasksError) throw tasksError;

                // تنظيف الحاوية لبدء العرض
                container.innerHTML = "";

                if (!tasks || tasks.length === 0) {
                    container.innerHTML = `<p style="color: #666; font-size: 0.95rem;">No tasks active for today.</p>`;
                    return;
                }

                // 4. بناء الكروت البرمجية المقتصرة على الإسم والربح وزر تنفيذ واحد
                tasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'task-card';

                    card.innerHTML = `
                        <div class="task-header">
                            <span class="task-title">${task.title}</span>
                            <span class="task-price">+$${parseFloat(task.reward || 0.00).toFixed(4)}</span>
                        </div>
                        <div style="margin-top: 5px;">
                            <button onclick="handleTaskCompletion('${task.id}')" class="task-action-btn">Complete & Earn</button>
                        </div>
                    `;

                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Error building dashboard tasks:", err);
                container.innerHTML = `<p style="color: #ff4444; font-size: 0.9rem;">Error loading tasks: ${err.message}</p>`;
            }
        }

        // دالة إرسال التثبيت وعند نجاحها تختفي المهمة تلقائياً من الـ Dashboard للأبد
        async function handleTaskCompletion(taskId) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert("Session expired. Please log in again.");

            const confirmation = confirm("Are you sure you have completed all requirements for this task?");
            if (!confirmation) return;

            try {
                // إدراج السجل في جدول الـ submissions لتوثيق إتمام المستخدم للمهمة
                const { error } = await supabase
                    .from('task_submissions')
                    .insert([
                        { 
                            task_id: taskId, 
                            user_id: user.id, 
                            status: 'pending',
                            created_at: new Date() 
                        }
                    ]);

                if (error) throw error;

                alert("Success! The task has been submitted and is now frozen for you.");
                loadDashboardTasks(); // إعادة استدعاء الدالة لتحديث الواجهة واختفاء المهمة فوراً

            } catch (error) {
                alert("Submission failed: " + error.message);
            }
        }
    </script>
</body>
</html>
