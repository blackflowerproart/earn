<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Task</title>
    <!-- Tailwind CSS for modern design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-xl border border-gray-700">
        <h2 class="text-3xl font-bold mb-6 text-center text-emerald-400">Create a New Task</h2>
        <p class="text-sm text-gray-400 mb-6 text-center">Cost: <span class="text-emerald-400 font-semibold">$0.50</span> per day</p>

        <form id="taskForm" class="space-y-5">
            <!-- Task Title -->
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Task Title</label>
                <input type="text" id="taskTitle" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white" placeholder="e.g., Subscribe to my channel">
            </div>

            <!-- Task Details -->
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Task Details / Instructions</label>
                <textarea id="taskDetails" rows="4" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white" placeholder="Describe the steps clearly..."></textarea>
            </div>

            <!-- Target URL -->
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Target Website URL</label>
                <input type="url" id="taskUrl" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white" placeholder="https://example.com">
            </div>

            <!-- Duration (Days) -->
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Duration (Days)</label>
                <input type="number" id="taskDays" min="1" value="1" required class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white">
                <p class="text-xs text-gray-400 mt-1">Total Budget: <span id="totalCost" class="text-emerald-400">$0.50</span></p>
            </div>

            <!-- Media Upload (Image or Video) -->
            <div>
                <label class="block text-sm font-medium mb-2 text-gray-300">Proof/Explanation Media (Image/Video)</label>
                <input type="file" id="taskMedia" accept="image/*,video/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-emerald-400 hover:file:bg-gray-600 cursor-pointer">
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-gray-900 font-bold rounded-lg transition duration-200">
                Publish Task
            </button>
        </form>
    </div>

    <script>
        // Initialize Supabase (Replace with your actual keys)
        const SUPABASE_URL = "https://eepmmmgxwfkkmjvkpudz.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY"; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const pricePerDay = 0.50;
        const taskDaysInput = document.getElementById('taskDays');
        const totalCostSpan = document.getElementById('totalCost');

        // Dynamically calculate budget
        taskDaysInput.addEventListener('input', () => {
            const days = parseInt(taskDaysInput.value) || 0;
            totalCostSpan.innerText = `$${(days * pricePerDay).toFixed(2)}`;
        });

        // Form Submit Logic
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Publishing...";

            // 1. Get logged in user session
            const { data: { user }, error: userError } = await supabase.auth.getUser();
            if (userError || !user) {
                alert("Please log in first to create a task.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
                return;
            }

            const title = document.getElementById('taskTitle').value;
            const details = document.getElementById('taskDetails').value;
            const url = document.getElementById('taskUrl').value;
            const days = parseInt(taskDaysInput.value);
            const mediaFile = document.getElementById('taskMedia').files[0];
            let mediaUrl = null;

            try {
                // 2. Upload media file to Supabase Storage if exists
                if (mediaFile) {
                    const fileExt = mediaFile.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    const filePath = `tasks/${user.id}/${fileName}`;

                    let { error: uploadError } = await supabase.storage
                        .from('task-media') // Make sure this bucket is created in Supabase Storage
                        .upload(filePath, mediaFile);

                    if (uploadError) throw uploadError;

                    // Get public URL
                    const { data: publicUrlData } = supabase.storage
                        .from('task-media')
                        .getPublicUrl(filePath);
                    
                    mediaUrl = publicUrlData.publicUrl;
                }

                // 3. Insert Task into database matching your table structure
                const { error: insertError } = await supabase
                    .from('tasks')
                    .insert([
                        {
                            user_id: user.id, // Task creator
                            title: title,
                            details: details,
                            target_url: url,
                            price: pricePerDay * days,
                            duration_days: days,
                            media_url: mediaUrl,
                            created_at: new Date()
                        }
                    ]);

                if (insertError) throw insertError;

                alert("Task Published Successfully for all users!");
                document.getElementById('taskForm').reset();
                totalCostSpan.innerText = "$0.50";

            } catch (error) {
                console.error(error);
                alert("Error creating task: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
            }
        });
    </script>
</body>
</html>
