<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Management - The BlackFlower</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* التنسيقات المخصصة لقسم المهام تماشياً مع طابع النيون والمظهر المظلم لصفحة الإعلانات */
        .tasks-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-top: 30px;
            width: 100%;
        }
        .tasks-panel {
            border: 2px solid #ffffff;
            background-color: #000000;
            padding: 25px;
        }
        .tasks-panel h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        /* كروت المهام المتاحة للتنفيذ */
        .task-card {
            border: 1px solid #333;
            background: #050505;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.3s;
        }
        .task-card:hover {
            border-color: #ff00ff;
        }
        .task-info h4 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #fff;
        }
        .task-info p {
            margin: 0 0 10px 0;
            color: #888;
            font-size: 0.9rem;
        }
        .task-meta {
            font-size: 0.85rem;
            color: #00ff77;
            font-family: monospace;
        }
        /* فورم إضافة مهمة جديدة */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .form-group label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ff00ff;
        }
        .form-control-file {
            background-color: #000000;
            color: #aaaaaa;
            padding: 10px 0;
            cursor: pointer;
            border: 1px dashed #333;
            padding: 10px;
        }
        .live-calc {
            background: #111;
            padding: 15px;
            border: 1px dashed #333;
            margin-top: 15px;
            font-family: monospace;
            font-size: 1rem;
        }
        .live-calc span {
            color: #ff00ff;
            font-weight: bold;
        }
        @media (max-width: 900px) {
            .tasks-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="header-text-block">
                <div class="brand-title">The BlackFlower</div>
                <div class="brand-subtitle">Tasks Hub</div>
            </div>
        </div>
    </header>

    <div class="container" style="max-width: 100%; padding: 0 20px;">
        
        <button onclick="window.location.href='dashboard.html'" class="btn-blackflower" style="margin-top:20px; min-width: 150px;">🏠 Back to Dashboard</button>
        

        <div class="tasks-wrapper">
            
            <div class="tasks-panel">
                <h2>📋 Available Tasks</h2>
                <div id="available-tasks-container">
                    <p style="color:#555;">Loading active tasks...</p>
                </div>
            </div>

            <div class="tasks-panel">
                <h2>📢 Create New Task</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" placeholder="e.g., SUBSCRIBE TO MY CHANNEL" required>
                    </div>

                    <div class="form-group">
                        <label for="taskDetails">Task Details / Instructions</label>
                        <textarea id="taskDetails" rows="4" placeholder="DESCRIBE THE STEPS REQUIRED..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="taskUrl">Target Website URL</label>
                        <input type="url" id="taskUrl" placeholder="https://example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="taskDays">Duration (Days)</label>
                        <input type="number" id="taskDays" min="1" value="1" required>
                    </div>

                    <div class="form-group">
                        <label for="taskMedia">Explanation Media (Image / Video)</label>
                        <input type="file" id="taskMedia" class="form-control-file" accept="image/*,video/*">
                    </div>

                    <div class="live-calc">
                        Total Task Cost: <span id="totalCost">$0.50</span>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-blackflower" style="width: 100%; margin-top: 15px; border-color: #00ff77; color: #00ff77;">🚀 Publish Task</button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        const pricePerDay = 0.50;
        const taskDaysInput = document.getElementById('taskDays');
        const totalCostSpan = document.getElementById('totalCost');

        // حساب التكلفة الفورية
        taskDaysInput.addEventListener('input', () => {
            const days = parseInt(taskDaysInput.value) || 0;
            totalCostSpan.innerText = `$${(days * pricePerDay).toFixed(2)}`;
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadActiveTasks();
            document.getElementById('taskForm').addEventListener('submit', handlePublishTask);
        });

        // 1. جلب المهام النشطة من جدول الـ tasks وعرضها
        async function loadActiveTasks() {
            const container = document.getElementById('available-tasks-container');
            
            if (typeof supabase === 'undefined') {
                container.innerHTML = '<p style="color:red;">Supabase not initialized.</p>';
                return;
            }

            const { data: tasks, error } = await supabase
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error || !tasks || tasks.length === 0) {
                container.innerHTML = '<p style="color:#666;">No active tasks available right now.</p>';
                return;
            }

            container.innerHTML = '';
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <div class="task-info">
                        <h4>${task.title}</h4>
                        <p>${task.details}</p>
                        <div class="task-meta">📅 Duration: ${task.duration_days} Days | 💰 Cost: $${parseFloat(task.price).toFixed(2)}</div>
                    </div>
                    <button onclick="window.open('${task.target_url}', '_blank')" class="btn-blackflower" style="min-width:100px;">🚀 Start</button>
                `;
                container.appendChild(card);
            });
        }

        // 2. منطق معالجة النشر ورفع الملفات
        async function handlePublishTask(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "PUBLISHING...";

            const title = document.getElementById('taskTitle').value;
            const details = document.getElementById('taskDetails').value;
            const url = document.getElementById('taskUrl').value;
            const days = parseInt(taskDaysInput.value);
            const mediaFile = document.getElementById('taskMedia').files[0];
            let mediaUrl = null;

            try {
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                if (userError || !user) {
                    alert("Please log in to your account first.");
                    return;
                }

                // رفع الميديا إلى الـ Bucket إن وجدت
                if (mediaFile) {
                    const fileExt = mediaFile.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    const filePath = `tasks/${user.id}/${fileName}`;

                    let { error: uploadError } = await supabase.storage
                        .from('task-media')
                        .upload(filePath, mediaFile);

                    if (uploadError) throw uploadError;

                    const { data: publicUrlData } = supabase.storage
                        .from('task-media')
                        .getPublicUrl(filePath);
                    
                    mediaUrl = publicUrlData.publicUrl;
                }

                // إدخال البيانات في قاعدة البيانات
                const { error: insertError } = await supabase
                    .from('tasks')
                    .insert([
                        {
                            user_id: user.id,
                            title: title,
                            details: details,
                            target_url: url,
                            price: pricePerDay * days,
                            duration_days: days,
                            media_url: mediaUrl,
                            created_at: new Date()
                        }
                    ]);

                if (insertError) throw insertError;

                alert("Task created successfully and listed on the Hub!");
                document.getElementById('taskForm').reset();
                totalCostSpan.innerText = "$0.50";
                loadActiveTasks(); // إعادة تحديث القائمة فوراً

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
            }
        }
    </script>
</body>
</html>
