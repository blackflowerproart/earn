<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - The BlackFlower</title>
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* تنسيقات إضافية مخصصة للفورم تتماشى تماماً مع الهوية البصرية الفخمة للموقع */
        .task-form-box {
            width: 100%;
            max-width: 600px;
            background-color: #000000;
            border: 2px solid #ffffff;
            padding: 40px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .form-title {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #222222;
            padding-bottom: 15px;
        }

        .form-cost-badge {
            text-align: center;
            font-size: 1rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            font-family: Arial, sans-serif;
        }

        .form-cost-badge span {
            color: #ffffff;
            font-family: monospace;
            font-weight: bold;
            border: 1px solid #ffffff;
            padding: 2px 6px;
            margin-left: 5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            font-weight: bold;
        }

        /* حقول الإدخال: سوداء، إطار رمادي دقيق، يتحول للأبيض عند التركيز وبزوايا حادة */
        .form-control {
            background-color: #050505;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            border-radius: 0px; /* زوايا حادة تماشياً مع الأزرار */
            transition: border-color 0.3s ease;
            width: 100%;
        }

        .form-control:focus {
            outline: none;
            border-color: #ffffff;
        }

        /* تخصيص حقل رفع الملفات ليتناسب مع النمط المودرن للموقع */
        .form-control-file {
            background-color: #000000;
            color: #aaaaaa;
            padding: 10px 0;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
        }

        /* زر النشر يأخذ كلاس موقعك الأصلي مع تعديل العرض ليصبح كاملاً */
        .task-form-box .btn-blackflower {
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="header-text-block">
                <div class="brand-title">The BlackFlower</div>
                <div class="brand-subtitle">Professional Art</div>
            </div>
        </div>
    </header>

    <div class="container">
        
        <div class="task-form-box">
            <h2 class="form-title">Create New Task</h2>
            <div class="form-cost-badge">Pricing: <span id="totalCost">$0.50</span> Per Day</div>

            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" class="form-control" placeholder="e.g., SUBSCRIBE TO MY CHANNEL" required>
                </div>

                <div class="form-group">
                    <label for="taskDetails">Task Details / Instructions</label>
                    <textarea id="taskDetails" class="form-control" rows="4" placeholder="DESCRIBE THE STEPS REQUIRED..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="taskUrl">Target Website URL</label>
                    <input type="url" id="taskUrl" class="form-control" placeholder="https://example.com" required>
                </div>

                <div class="form-group">
                    <label for="taskDays">Duration (Days)</label>
                    <input type="number" id="taskDays" class="form-control" min="1" value="1" required>
                </div>

                <div class="form-group">
                    <label for="taskMedia">Explanation Media (Image / Video)</label>
                    <input type="file" id="taskMedia" class="form-control-file" accept="image/*,video/*">
                </div>

                <button type="submit" id="submitBtn" class="btn-blackflower">Publish Task</button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        // حساب التكلفة الإجمالية ديناميكياً تماشياً مع الـ Inputs
        const pricePerDay = 0.50;
        const taskDaysInput = document.getElementById('taskDays');
        const totalCostSpan = document.getElementById('totalCost');

        taskDaysInput.addEventListener('input', () => {
            const days = parseInt(taskDaysInput.value) || 0;
            totalCostSpan.innerText = `$${(days * pricePerDay).toFixed(2)}`;
        });

        // منطق رفع البيانات الحية إلى سوبابيز عند الضغط على الزر الفاخر
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "PUBLISHING...";

            if (typeof supabase === 'undefined') {
                alert("Supabase is not initialized. Check your js/supabase-config.js file.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
                return;
            }

            const { data: { user }, error: userError } = await supabase.auth.getUser();
            if (userError || !user) {
                alert("Please log in to your account first.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
                return;
            }

            const title = document.getElementById('taskTitle').value;
            const details = document.getElementById('taskDetails').value;
            const url = document.getElementById('taskUrl').value;
            const days = parseInt(taskDaysInput.value);
            const mediaFile = document.getElementById('taskMedia').files[0];
            let mediaUrl = null;

            try {
                // رفع الميديا إلى الـ Bucket الخاص بك إن وجدت
                if (mediaFile) {
                    const fileExt = mediaFile.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    const filePath = `tasks/${user.id}/${fileName}`;

                    let { error: uploadError } = await supabase.storage
                        .from('task-media')
                        .upload(filePath, mediaFile);

                    if (uploadError) throw uploadError;

                    const { data: publicUrlData } = supabase.storage
                        .from('task-media')
                        .getPublicUrl(filePath);
                    
                    mediaUrl = publicUrlData.publicUrl;
                }

                // حقن البيانات في جدول الـ tasks الأساسي لجميع الأعضاء
                const { error: insertError } = await supabase
                    .from('tasks')
                    .insert([
                        {
                            user_id: user.id,
                            title: title,
                            details: details,
                            target_url: url,
                            price: pricePerDay * days,
                            duration_days: days,
                            media_url: mediaUrl,
                            created_at: new Date()
                        }
                    ]);

                if (insertError) throw insertError;

                alert("Task created successfully and listed on the Dashboard!");
                document.getElementById('taskForm').reset();
                totalCostSpan.innerText = "$0.50";

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Task";
            }
        });
    </script>
</body>
</html>
