<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower - Professional Art</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="header-text-block">
                <div class="brand-title">The BlackFlower</div>
                <div class="brand-subtitle">Professional Art</div>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 style="text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; text-align: center;">Welcome to The BlackFlower</h2>
        <p style="color: #aaaaaa; margin-bottom: 40px; font-size: 1.1rem; text-align: center; letter-spacing: 1px;">Join the professional art community and start your journey.</p>
        
        <div class="auth-buttons-container">
            <button onclick="window.location.href='login.html'" class="btn-blackflower">Login</button>
            <button onclick="window.location.href='register.html'" class="btn-blackflower">Register</button>
