<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The BlackFlower - الرئيسية</title>
    
    <link rel="stylesheet" href="../css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <img src="../logo.png" alt="BlackFlower Logo" class="header-logo">
            <div class="brand-title">The BlackFlower</div>
            <div class="brand-subtitle">Professional Art</div>
        </div>
    </header>

    <div class="container" style="text-align: center;">
        <h1 style="text-transform: uppercase; margin-bottom: 15px; font-size: 24pt; letter-spacing: 1px;">منصة الإنتاج الرقمي</h1>
        <p style="font-size: 14px; opacity: 0.8; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.8;">
            مرحباً بك في المنصة الفنية المخصصة لتنفيذ المهام اليومية، مشاهدة الإعلانات المحمية، التعدين الافتراضي، والمطالبة بمكافآت الصنبور المجانية.
        </p>

        <div id="auth-actions" style="margin: 20px 0; display: flex; justify-content: center; gap: 20px;">
            <button onclick="window.location.href='login.html'">تسجيل الدخول</button>
            <button onclick="window.location.href='register.html'" style="background-color: #000000; color: #ffffff;">إنشاء حساب جديد</button>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
